     /* --- トップへ戻るボタン（光る＋フェードイン＋浮遊） --- */
#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 52px;
    height: 52px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    display: none;
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.3s ease, box-shadow 0.4s ease;
    z-index: 999;

    /* ★ 浮遊アニメーションを追加 */
    animation: floatUpDown 3.2s ease-in-out infinite;
}

/* ホバー時：光るグロー */
#backToTop:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-6px);
    box-shadow: 0 0 12px #81d5ff, 0 0 25px rgba(129,213,255,0.6);
}

/* フェードイン（スクロールで出現） */
#backToTop.show {
    display: block;
    opacity: 1;
}

/* ★ たゆっと上下に揺れるアニメーション */
@keyframes floatUpDown {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-7px); }
    100% { transform: translateY(0); }
}

 <button id="backToTop">▲</button>

<script>
    const backToTop = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
            backToTop.classList.add("show");   // フェードイン
        } else {
            backToTop.classList.remove("show"); // フェードアウト
        }
    });

    backToTop.addEventListener("click", () => {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
    
</script>
