<!DOCTYPE html>
<html lang="ja">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://item-shopping.c.yimg.jp/i/n/restt_rogo-00164" sizes="16×16" type="image/png" />   
   <title>アンケート</title>


   <style>

     /* --- トップへ戻るボタン（光る＋フェードイン＋浮遊） --- */
#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 52px;
    height: 52px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    display: none;
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.3s ease, box-shadow 0.4s ease;
    z-index: 999;

    /* ★ 浮遊アニメーションを追加 */
    animation: floatUpDown 3.2s ease-in-out infinite;
}

/* ホバー時：光るグロー */
#backToTop:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-6px);
    box-shadow: 0 0 12px #81d5ff, 0 0 25px rgba(129,213,255,0.6);
}

/* フェードイン（スクロールで出現） */
#backToTop.show {
    display: block;
    opacity: 1;
}

/* ★ たゆっと上下に揺れるアニメーション */
@keyframes floatUpDown {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-7px); }
    100% { transform: translateY(0); }
}

       body {
           font-family: "Noto Sans JP", sans-serif;
           background: #0e0e16;
           color: #ffffff;
           line-height: 1.6;
       }
       a { color: #6ecfff; text-decoration: none; }


       header {
           padding: 20px 40px;
           display: flex;
           justify-content: space-between;
           align-items: center;
           border-bottom: 1px solid rgba(255,255,255,0.1);
       }
       header h1 {
           font-size: 1.4rem;
           letter-spacing: 2px;
           display: flex;
           align-items: center;
           gap: 12px;
       }
       header h1 img {
           height: 40px;
       }
       nav a {
           margin-left: 20px;
           font-size: 0.9rem;
           opacity: 0.8;
       }
       nav a:hover {
           opacity: 1;
       }


       .hero {
           height: 80vh;
           background: url("") center/cover no-repeat;
           display: flex;
           align-items: center;
           justify-content: center;
           text-align: center;
           padding: 30px;
       }
       .hero h2 {
           font-size: 2.4rem;
           margin-bottom: 10px;
           text-shadow: 0px 0px 12px rgba(255,255,255,0.6);
       }
       .hero p {
           opacity: 0.8;
           font-size: 1.2rem;
       }


       section {
           padding: 80px 40px;
           max-width: 1100px;
           margin: 0 auto;
       }
       section h3 {
           font-size: 1.8rem;
           margin-bottom: 25px;
           border-left: 4px solid #5ac8ff;
           padding-left: 12px;
       }


       .product-list {
           display: grid;
           grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
           gap: 30px;
       }
       .product {
           background: rgba(255,255,255,0.06);
           padding: 20px;
           border-radius: 12px;
           transition: 0.2s;
       }
       .product:hover {
           background: rgba(255,255,255,0.12);
       }
       .product img 
       .service img { 
           width: 50%;
           border-radius: 10px;

       .product img,
       .service img {
           width: 50%;
           display: block;
           margin: 0 auto;
       }

           
       }
       .product h4 {
           margin: 15px 0 10px;
           font-size: 1.1rem;
       }
       .product p {
           opacity: 0.8;
           font-size: 0.9rem;
       }


       .about-text {
           opacity: 0.85;
           font-size: 1rem;
           line-height: 1.8;
       }


       footer {
           padding: 30px;
           text-align: center;
           font-size: 0.85rem;
           color: rgba(255,255,255,0.5);
           border-top: 1px solid rgba(255,255,255,0.1);
           margin-top: 60px;
       }


       @media (max-width: 700px) {
           header { flex-direction: column; text-align: center; }
           nav a { margin: 0 10px; }
           .hero h2 { font-size: 1.8rem; }
           .hero p { font-size: 1rem; }
       }
   </style>
</head>
<body>


   <header>
       <h1>
           <img src="https://item-shopping.c.yimg.jp/i/n/restt_rogo-00164" alt="ロゴ" height="150">
           STAR CORPORATION
       </h1>
       
   </header>


   <div class="hero">
       <div>
           <h2>日常捨てろよ。</h2>
           <p>役に立たないものしか作らない会社、スターコーポレーション。</p>
       </div>
   </div>


  


　<section id="view">
    <h3>アンケート</h3>

    <form action="https://script.google.com/a/macros/hongo.ed.jp/s/AKfycbzvghJDe40Gglzar98szI8tOP7WPCTnROVo-oWcodFV7ILKNiFfE3lAKNfGL9_tfkfUWg/exec" method="post">

        <p>あなたの名前:
            <input type="text" name="yourname" placeholder="Novel Star" required>
        </p>

        <p>どのゲームが一番好きか
            <input type="text" name="answer" placeholder="ソリティア" required>
        </p>

        <p>備考:
            <input type="text" name="bikou" placeholder="ない場合はなし" required>
        </p>

        <p>
            <input type="submit" name="submit" value="送信">
        </p>

    </form>
</section>

               
   <footer>
       © 2025 STAR CORPORATION - All Rights Reserved.
   </footer>

 <button id="backToTop">▲</button>

<script>
    const backToTop = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
            backToTop.classList.add("show");   // フェードイン
        } else {
            backToTop.classList.remove("show"); // フェードアウト
        }
    });

    backToTop.addEventListener("click", () => {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
</script>




</body>
</html>
